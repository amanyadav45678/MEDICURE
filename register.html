<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register — MEDICURE</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/global.css">
<link rel="stylesheet" href="css/auth.css">
</head>
<body>

<div class="toast" id="toast"></div>

<div class="auth-wrap">
  <div class="auth-orb auth-orb1"></div>
  <div class="auth-orb auth-orb2"></div>
  <div class="auth-box">
    <div class="auth-logo">🏥 MEDICURE</div>
    <h2 class="auth-title">Create account</h2>
    <p class="auth-sub">Join MEDICURE — it's completely free</p>
    <div class="role-toggle">
      <button class="role-btn active" id="reg-patient-btn" onclick="window.setRegRole('patient')">👤 Patient</button>
      <button class="role-btn" id="reg-doctor-btn" onclick="window.setRegRole('doctor')">👨‍⚕️ Doctor</button>
    </div>
    <div class="auth-error" id="reg-error"></div>
    <div class="form-group"><label>Full Name</label><input class="form-input" type="text" id="reg-name" placeholder="Your full name"></div>
    <div class="form-group" id="reg-spec-group" style="display:none"><label>Specialization</label><input class="form-input" type="text" id="reg-spec" placeholder="e.g. Cardiologist, General Physician"></div>
    <div class="form-group"><label>Email</label><input class="form-input" type="email" id="reg-email" placeholder="you@example.com"></div>
    <div class="form-group"><label>Password</label><input class="form-input" type="password" id="reg-password" placeholder="Min 6 characters"></div>
    <div class="form-group"><label>Age</label><input class="form-input" type="number" id="reg-age" placeholder="Your age"></div>
    <div class="form-group"><label>Gender</label>
      <select class="form-input" id="reg-gender">
        <option value="">Select gender</option><option>Male</option><option>Female</option><option>Other</option>
      </select>
    </div>
    <button class="auth-btn" onclick="window.doRegister()">Create Account →</button>
    <div class="auth-switch" style="margin-top:.8rem;">Already have an account? <a href="login.html">Sign In</a></div>
    <div class="auth-switch" style="margin-top:.4rem;"><a href="index.html">← Back to Home</a></div>
  </div>
</div>

<script type="module" src="js/main.js"></script>
</body>
</html>
